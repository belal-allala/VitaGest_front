<div class="container-fluid min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="row w-100 justify-content-center">
    <div class="col-12 col-sm-8 col-md-6 col-lg-4 col-xl-3">
      
      <div class="card shadow-sm border-0 rounded-4">
        <div class="card-header bg-success text-white text-center rounded-top-4 py-4 border-0">
          <svg style="width: 48px; height: 48px; margin-bottom: 0.5rem;" viewBox="0 0 24 24" fill="none">
             <path d="M12 2v20M17 5H7a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
             <path d="M9 12h6M12 9v6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <h4 class="mb-0 fw-semibold">VitaGest</h4>
          <p class="mb-0 small text-white-50">Accès Professionnel</p>
        </div>
        
        <div class="card-body p-4 p-sm-5">
          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            
            <div *ngIf="errorMessage" class="alert alert-danger d-flex align-items-center mb-4" role="alert">
              <svg class="bi flex-shrink-0 me-2" width="24" height="24" role="img" aria-label="Danger:"><use xlink:href="#exclamation-triangle-fill"/></svg>
              <div>{{ errorMessage }}</div>
            </div>

            <div class="mb-3">
              <label for="email" class="form-label fw-medium">Email</label>
              <input 
                type="email" 
                class="form-control" 
                id="email" 
                formControlName="email"
                [ngClass]="{'is-invalid': loginForm.get('email')?.invalid && loginForm.get('email')?.touched}"
                placeholder="Entrez votre adresse email"
              >
              <div class="invalid-feedback">
                Un email valide est requis.
              </div>
            </div>

            <div class="mb-4">
              <label for="password" class="form-label fw-medium">Mot de passe</label>
              <input 
                type="password" 
                class="form-control" 
                id="password" 
                formControlName="password"
                [ngClass]="{'is-invalid': loginForm.get('password')?.invalid && loginForm.get('password')?.touched}"
                placeholder="Entrez votre mot de passe"
              >
              <div class="invalid-feedback">
                Le mot de passe est requis.
              </div>
            </div>

            <button type="submit" class="btn btn-success w-100 py-2 fw-semibold" [disabled]="isLoading">
              <span *ngIf="isLoading" class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
              {{ isLoading ? 'Connexion en cours...' : 'Se connecter' }}
            </button>
            
          </form>
        </div>
      </div>

    </div>
  </div>
</div>

<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
  <symbol id="exclamation-triangle-fill" fill="currentColor" viewBox="0 0 16 16">
    <path d="M8.982 1.566a1.13 1.13 0 0 0-1.96 0L.165 13.233c-.457.778.091 1.767.98 1.767h13.713c.889 0 1.438-.99.98-1.767L8.982 1.566zM8 5c.535 0 .954.462.9.995l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 5.995A.905.905 0 0 1 8 5zm.002 6a1 1 0 1 1 0 2 1 1 0 0 1 0-2z"/>
  </symbol>
</svg>
