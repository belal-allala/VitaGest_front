<div class="login-container">
  <div class="login-card">
    <div class="text-center">
      <div class="brand-logo">
        VG
      </div>
      <h2 class="login-title">VitaGest</h2>
      <p class="login-subtitle">Système de Gestion Pharmaceutique</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      @if (errorMessage) {
        <div class="alert alert-modern mb-4 d-flex align-items-center gap-2">
          <svg style="width: 18px; height: 18px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
          {{ errorMessage }}
        </div>
      }

      <div class="mb-4">
        <label class="form-label">ADRESSE EMAIL Professionnelle</label>
        <div class="position-relative">
          <input 
            type="email" 
            class="form-control form-control-dark ps-2" 
            formControlName="email"
            placeholder="nom@vitagest.com"
            [ngClass]="{'is-invalid': loginForm.get('email')?.invalid && loginForm.get('email')?.touched}"
          >
        </div>
      </div>

      <div class="mb-5">
        <label class="form-label">MOT DE PASSE SÉCURISÉ</label>
        <div class="position-relative">
          <input 
            type="password" 
            class="form-control form-control-dark ps-2" 
            formControlName="password"
            placeholder="••••••••"
            [ngClass]="{'is-invalid': loginForm.get('password')?.invalid && loginForm.get('password')?.touched}"
          >
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-login w-100 d-flex align-items-center justify-content-center gap-2" [disabled]="isLoading">
        @if (isLoading) {
          <span class="spinner-border spinner-border-sm" role="status"></span>
        }
        {{ isLoading ? 'Authentification...' : 'Accéder au Système' }}
      </button>

      <div class="mt-4 text-center">
        <span class="text-secondary small">© 2026 VitaGest Smart Pharma. Tous droits réservés.</span>
      </div>
    </form>
  </div>
</div>

  </symbol>
</svg>
