<aside class="d-flex flex-column h-100 bg-dark text-light">
  <!-- Logo -->
  <div class="d-flex align-items-center gap-2 px-4 py-3 border-bottom border-secondary">
    <div
      class="d-flex align-items-center justify-content-center rounded-3 bg-success text-dark fw-semibold"
      style="width: 36px; height: 36px;"
    >
      V
    </div>
    <div class="d-flex flex-column">
      <span class="fw-semibold fs-5">VitaGest</span>
      <span class="small text-secondary">Tableau de bord</span>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="mt-3 flex-grow-1 px-2">
    <a
      routerLink="/admin/dashboard"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="d-flex align-items-center gap-2 px-3 py-2 rounded small text-light text-decoration-none mb-1 sidebar-link"
    >
      <!-- Icon: Dashboard -->
      <span
        class="d-inline-flex align-items-center justify-content-center rounded bg-secondary bg-opacity-25"
        style="width: 32px; height: 32px;"
      >
        <svg class="text-light" style="width: 16px; height: 16px;" viewBox="0 0 24 24" fill="none">
          <path
            d="M4 13h7V4H4v9Zm0 7h7v-5H4v5Zm9 0h7V11h-7v9Zm0-16v5h7V4h-7Z"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </span>
      <span>Dashboard</span>
    </a>

    <a
      routerLink="/admin/medicaments"
      routerLinkActive="active"
      class="d-flex align-items-center gap-2 px-3 py-2 rounded small text-light text-decoration-none mb-1 sidebar-link"
    >
      <!-- Icon: Médicaments -->
      <span
        class="d-inline-flex align-items-center justify-content-center rounded bg-secondary bg-opacity-25"
        style="width: 32px; height: 32px;"
      >
        <svg class="text-light" style="width: 16px; height: 16px;" viewBox="0 0 24 24" fill="none">
          <path
            d="M7 4h10a2 2 0 0 1 2 2v2H5V6a2 2 0 0 1 2-2Zm-2 6h14v8a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-8Zm7 2v4m-2-2h4"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </span>
      <span>Médicaments</span>
    </a>

    <a
      routerLink="/admin/stocks"
      routerLinkActive="active"
      class="d-flex align-items-center gap-2 px-3 py-2 rounded small text-light text-decoration-none mb-1 sidebar-link"
    >
      <!-- Icon: Stocks -->
      <span
        class="d-inline-flex align-items-center justify-content-center rounded bg-secondary bg-opacity-25"
        style="width: 32px; height: 32px;"
      >
        <svg class="text-light" style="width: 16px; height: 16px;" viewBox="0 0 24 24" fill="none">
          <path
            d="M4 9.5 12 4l8 5.5-8 5.5-8-5.5Z"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M4 14.5 12 20l8-5.5"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </span>
      <span>Stocks</span>
    </a>

    @if (isAdmin()) {
    <a
      routerLink="/admin/fournisseurs"
      routerLinkActive="active"
      class="d-flex align-items-center gap-2 px-3 py-2 rounded small text-light text-decoration-none mb-1 sidebar-link"
    >
      <!-- Icon: Fournisseurs -->
      <span
        class="d-inline-flex align-items-center justify-content-center rounded bg-secondary bg-opacity-25"
        style="width: 32px; height: 32px;"
      >
        <svg class="text-light" style="width: 16px; height: 16px;" viewBox="0 0 24 24" fill="none">
          <path
            d="M5 20v-6a7 7 0 1 1 14 0v6"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M9 20v-3a3 3 0 1 1 6 0v3"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </span>
      <span>Fournisseurs</span>
    </a>
    }

    <a
      routerLink="/admin/ventes"
      routerLinkActive="active"
      class="d-flex align-items-center gap-2 px-3 py-2 rounded small text-light text-decoration-none mb-1 sidebar-link"
    >
      <!-- Icon: Ventes -->
      <span
        class="d-inline-flex align-items-center justify-content-center rounded bg-secondary bg-opacity-25"
        style="width: 32px; height: 32px;"
      >
        <svg class="text-light" style="width: 16px; height: 16px;" viewBox="0 0 24 24" fill="none">
          <path
            d="M5 11h4l2-4 2 8 2-4h4"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M4 19h16"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
          />
        </svg>
      </span>
      <span>Ventes</span>
    </a>

    <a
      routerLink="/admin/prescriptions"
      routerLinkActive="active"
      class="d-flex align-items-center gap-2 px-3 py-2 rounded small text-light text-decoration-none mb-1 sidebar-link"
    >
      <!-- Icon: Prescriptions -->
      <span
        class="d-inline-flex align-items-center justify-content-center rounded bg-secondary bg-opacity-25"
        style="width: 32px; height: 32px;"
      >
        <svg class="text-light" style="width: 16px; height: 16px;" viewBox="0 0 24 24" fill="none">
          <path
            d="M6 20h12a1 1 0 0 0 1-1v-9.5L14.5 4H7a1 1 0 0 0-1 1v15Z"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M14 4v4h4M9 11h6M9 14h6M9 17h4"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </span>
      <span>Ordonnances</span>
    </a>

    <a
      routerLink="/admin/clients"
      routerLinkActive="active"
      class="d-flex align-items-center gap-2 px-3 py-2 rounded small text-light text-decoration-none mb-1 sidebar-link"
    >
      <!-- Icon: Clients -->
      <span
        class="d-inline-flex align-items-center justify-content-center rounded bg-secondary bg-opacity-25"
        style="width: 32px; height: 32px;"
      >
        <svg class="text-light" style="width: 16px; height: 16px;" viewBox="0 0 24 24" fill="none">
          <path
            d="M9 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M15 12a3 3 0 1 0 0-6"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M4 20a5 5 0 0 1 10 0M17 16a4 4 0 0 1 3 4"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </span>
      <span>Clients</span>
    </a>

    @if (isAdmin()) {
    <a
      routerLink="/admin/utilisateurs"
      routerLinkActive="active"
      class="d-flex align-items-center gap-2 px-3 py-2 rounded small text-light text-decoration-none mb-1 sidebar-link"
    >
      <!-- Icon: Utilisateurs -->
      <span
        class="d-inline-flex align-items-center justify-content-center rounded bg-secondary bg-opacity-25"
        style="width: 32px; height: 32px;"
      >
        <svg class="text-light" style="width: 16px; height: 16px;" viewBox="0 0 24 24" fill="none">
          <path
            d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M4 20a8 8 0 0 1 16 0"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </span>
      <span>Utilisateurs</span>
    </a>
    }

    @if (isAdmin()) {
    <a
      routerLink="/admin/rapports"
      routerLinkActive="active"
      class="d-flex align-items-center gap-2 px-3 py-2 rounded small text-light text-decoration-none mb-1 sidebar-link"
    >
      <!-- Icon: Rapports -->
      <span
        class="d-inline-flex align-items-center justify-content-center rounded bg-secondary bg-opacity-25"
        style="width: 32px; height: 32px;"
      >
        <svg class="text-light" style="width: 16px; height: 16px;" viewBox="0 0 24 24" fill="none">
          <path
            d="M6 20h12a1 1 0 0 0 1-1v-9.5L14.5 4H7a1 1 0 0 0-1 1v15Z"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
          <path
            d="M14 4v4h4M9 13h6M9 16h3"
            stroke="currentColor"
            stroke-width="1.6"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </span>
      <span>Rapports</span>
    </a>
    }

    @if (isAdmin()) {
    <a
      routerLink="/admin/audits"
      routerLinkActive="active"
      class="d-flex align-items-center gap-2 px-3 py-2 rounded small text-light text-decoration-none mb-1 sidebar-link"
    >
      <!-- Icon: Audit -->
      <span
        class="d-inline-flex align-items-center justify-content-center rounded bg-secondary bg-opacity-25 bg-danger bg-opacity-10 text-danger"
        style="width: 32px; height: 32px;"
      >
         <svg style="width: 16px; height: 16px;" class="text-danger" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2v20"></path><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
         </svg>
      </span>
      <span class="text-danger fw-bold">Traçabilité</span>
    </a>
    }
  </nav>

  <!-- Bottom Profile Section -->
  <div class="mt-auto border-top border-secondary p-3">
    <div class="d-flex align-items-center justify-content-between p-2 rounded bg-secondary bg-opacity-10">
      <div class="d-flex align-items-center gap-2">
         <div class="rounded-circle bg-success text-dark fw-bold d-flex justify-content-center align-items-center" style="width: 32px; height: 32px; font-size: 0.85rem;">
            {{ userInitial() }}
         </div>
         <div class="d-flex flex-column overflow-hidden" style="max-width: 110px;">
           <span class="small fw-semibold text-truncate text-light">{{ userName() }}</span>
           <span class="text-secondary text-truncate" style="font-size: 0.70rem;">{{ userRole() }}</span>
         </div>
      </div>
      <button class="btn btn-sm text-secondary p-1 border-0 bg-transparent action-btn" title="Déconnexion" (click)="logout()">
         <svg style="width: 18px; height: 18px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
           <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line>
         </svg>
      </button>
    </div>
  </div>
</aside>
