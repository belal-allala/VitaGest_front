name: Frontend CI

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-angular:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          
      - name: Install Dependencies & Build
        run: |
          npm ci
          npm run build -- --configuration production
          
  docker-verify:
    runs-on: ubuntu-latest
    needs: build-test-angular
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker Image
        run: docker build -t vitagest-frontend .
